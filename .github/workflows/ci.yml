name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build
        run: swift build -c release --arch arm64

      - name: Test
        run: swift test

      - name: Package app
        run: Scripts/package_app.sh

      - name: Verify bundle
        run: |
          test -f build/NotchFlow.app/Contents/MacOS/NotchFlow
          file build/NotchFlow.app/Contents/MacOS/NotchFlow
